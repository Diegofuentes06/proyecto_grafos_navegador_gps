<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegador GPS para Campus Universitario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>Navegador GPS</h1>
            <div class="form-group">
                <label for="origin">Origen:</label>
                <select id="origin">
                    <option value="">Seleccionar...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="destination">Destino:</label>
                <select id="destination">
                    <option value="">Seleccionar...</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="accessible"> Solo rutas accesibles
                </label>
            </div>
            <button id="calculate">Calcular Ruta</button>
            <div id="route-info" class="route-info">
                <h3>Información de Ruta</h3>
                <p id="distance">Distancia: --</p>
                <p id="time">Tiempo estimado: --</p>
            </div>
            <div id="block-controls" class="block-controls">
                <h3>Bloquear Caminos</h3>
                <select id="block-from">
                    <option value="">De:</option>
                </select>
                <select id="block-to">
                    <option value="">A:</option>
                </select>
                <button id="block">Bloquear</button>
                <button id="unblock">Desbloquear</button>
            </div>
            <div id="interests" class="interests">
                <h3>Puntos de Interés Cercanos</h3>
                <ul id="interest-list"></ul>
            </div>
        </aside>
        <main class="map-container">
            <svg id="map-svg" width="800" height="600" viewBox="0 0 800 600">
            </svg>
            <div id="legend" class="legend">
                <h4>Leyenda</h4>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #3498db;"></span> Biblioteca/Edificios
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #e67e22;"></span> Cafetería/Servicios
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #9b59b6;"></span> Laboratorios/Gimnasio
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #27ae60;"></span> Baños/Plaza
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #95a5a6;"></span> Parqueadero
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background-color: #e74c3c;"></span> Oficinas
                </div>
            </div>
            <div id="tooltip" class="tooltip" style="display: none;"></div>
        </main>
    </div>
    <script src="data.js"></script>
    <script src="graph.js"></script>
    <script src="dijkstra.js"></script>
    <script src="script.js"></script>
</body>
</html>
